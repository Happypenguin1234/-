<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>企鵝森友會：南極小島冒險</title>
    <style>
        :root {
            --island-green: #a5d6a7;
            --ocean-blue: #81d4fa;
            --wood-brown: #8d6e63;
            --deep-blue: #01579b;
            --penguin-black: #263238;
        }

        body {
            font-family: 'Segoe UI', 'Microsoft JhengHei', sans-serif;
            background-color: #f0faff;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        #game-container {
            width: 95%;
            max-width: 800px;
            height: 780px;
            background: #ffffff;
            border-radius: 30px;
            border: 10px solid #fff;
            box-shadow: 0 15px 50px rgba(0,0,0,0.1);
            position: relative;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        #top-nav {
            background: #f1f8e9;
            padding: 15px;
            display: flex;
            justify-content: center;
            gap: 10px;
            border-bottom: 3px solid #dcedc8;
        }

        .nav-tab {
            padding: 8px 20px;
            border-radius: 20px;
            font-weight: bold;
            cursor: pointer;
            border: none;
            font-size: 14px;
            transition: 0.3s;
        }

        .tab-main { background: var(--island-green); color: #2e7d32; }
        .tab-locked { background: #e0e0e0; color: #9e9e9e; cursor: not-allowed; }
        .tab-unlocked { background: #ffccbc; color: #d84315; box-shadow: 0 3px 0 #ffab91; }

        #hud {
            padding: 10px 25px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #fff;
            font-weight: bold;
        }

        .res-group { display: flex; gap: 12px; font-size: 14px; }

        .book-btn {
            background: white;
            border: 3px solid var(--island-green);
            padding: 15px 25px;
            margin: 10px;
            border-radius: 15px;
            cursor: pointer;
            font-weight: bold;
            font-size: 18px;
            color: #2e7d32;
            transition: 0.3s;
            display: block;
            width: 80%;
            margin-left: auto;
            margin-right: auto;
        }
        .book-btn:hover { background: var(--island-green); color: white; }

        #game-screen {
            flex-grow: 1;
            display: grid;
            grid-template-columns: 1fr 1fr;
            grid-template-rows: 1fr 1fr;
            gap: 20px;
            padding: 25px;
            background: linear-gradient(to bottom, #f0faff, #ffffff);
        }

        .stage-card {
            background: white;
            border-radius: 20px;
            border: 4px solid var(--island-green);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            transition: 0.3s;
        }

        .stage-card:hover { transform: scale(1.03); background: #f1f8e9; }
        .stage-title { margin-top: 10px; font-weight: bold; color: #2e7d32; font-size: 16px; }

        #build-area { padding: 20px; background: #f9f9f9; text-align: center; border-top: 2px solid #eee; }
        .progress-container { width: 100%; height: 15px; background: #eee; border-radius: 10px; margin: 10px 0; overflow: hidden; }
        #progress-bar { width: 0%; height: 100%; background: var(--island-green); transition: 0.8s; }

        .overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); display: flex; justify-content: center; align-items: center; z-index: 100; }
        .modal { background: white; padding: 30px; border-radius: 25px; width: 85%; max-width: 450px; text-align: center; max-height: 90vh; overflow-y: auto; }
        
        .intro-text {
            background: #e3f2fd; padding: 20px; border-radius: 15px; color: #01579b; font-size: 15px; line-height: 1.8; margin-bottom: 20px; border-left: 8px solid var(--ocean-blue); text-align: left;
        }

        .btn-main { background: var(--deep-blue); color: white; border: none; padding: 12px; border-radius: 12px; cursor: pointer; width: 100%; font-weight: bold; margin-top: 10px; }
        .btn-option { background: #f1f8e9; border: 2px solid var(--island-green); padding: 12px; border-radius: 10px; cursor: pointer; width: 100%; margin: 6px 0; font-size: 16px; font-weight: bold; color: #2e7d32; }
        
        .invite-btns { display: flex; gap: 10px; margin-top: 20px; }
        .btn-invite { flex: 1; padding: 15px; border-radius: 10px; border: none; font-weight: bold; cursor: pointer; font-size: 18px; }
        .btn-yes { background: var(--island-green); color: #1b5e20; }
        .btn-no { background: #ffcdd2; color: #b71c1c; }

        #final-canvas { border: 5px solid var(--island-green); margin-top: 10px; display: none; background: white; border-radius: 15px; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

<div id="game-container">
    <div id="name-overlay" class="overlay">
        <div class="modal">
            <div style="font-size: 50px;">🐧</div>
            <h2>企鵝森友會</h2>
            <div class="intro-text">「你是這座島主。透過冒險裝飾這座島，找朋友、種植物，完成心目中的家！」</div>
            <p>請輸入島主名字：</p>
            <input type="text" id="player-input" style="width:80%; padding:10px; text-align:center; border:2px solid var(--ocean-blue); border-radius:10px; font-size:18px;" placeholder="名字">
            <button class="btn-main" onclick="showBookSelection()">下一步</button>
        </div>
    </div>

    <div id="book-overlay" class="overlay hidden">
        <div class="modal">
            <h2>選擇島嶼規模與難度</h2>
            <p>請選擇您想要開發的島嶼與教材：</p>
            <button class="book-btn" onclick="selectBook(1)">第一冊 (B1) - 選擇小島</button>
            <button class="book-btn" onclick="selectBook(2)">第二冊 (B2) - 選擇中島</button>
            <button class="book-btn" onclick="selectBook(3)">第三冊 (B3) - 選擇大島</button>
        </div>
    </div>

    <div id="top-nav">
        <button id="tab-animal" class="nav-tab tab-locked" onclick="startSpecial('animal')">招募島民</button>
        <button id="tab-main" class="nav-tab tab-main">我的小島</button>
        <button id="tab-plant" class="nav-tab tab-locked" onclick="startSpecial('plant')">種種植物</button>
    </div>

    <div id="hud" class="hidden">
        <div>🏝️ <span id="display-name">---</span> (<span id="display-book">小島</span>)</div>
        <div class="res-group">
            <span>✨ <span id="r-pts">0</span></span>
            <span>👥 <span id="r-ani">0</span></span>
            <span>🌸 <span id="r-pla">0</span></span>
        </div>
        <button onclick="endGameFlow()" style="background:none; border:1px solid #ccc; cursor:pointer; border-radius:5px; font-size:12px;">結算</button>
    </div>

    <div id="game-screen">
        <div class="stage-card" onclick="triggerQuiz('pinyin')">
            <div style="font-size: 40px;">🪨</div>
            <div class="stage-title">挖掘石頭</div>
        </div>
        <div class="stage-card" onclick="triggerQuiz('grammar')">
            <div style="font-size: 40px;">🪵</div>
            <div class="stage-title">收集木頭</div>
        </div>
        <div class="stage-card" onclick="triggerQuiz('usage')">
            <div style="font-size: 40px;">🍃</div>
            <div class="stage-title">採集樹葉</div>
        </div>
        <div class="stage-card" onclick="triggerQuiz('culture')">
            <div style="font-size: 40px;">🐧</div>
            <div class="stage-title">拜訪朋友</div>
        </div>
    </div>

    <div id="build-area">
        <div id="house-status" style="font-weight:bold; color:#2e7d32;">進度：露天帳篷</div>
        <div class="progress-container"><div id="progress-bar"></div></div>
        <button class="btn-main" onclick="tryBuild()" style="width:auto; padding:5px 40px;">房屋升級</button>
    </div>

    <div id="quiz-overlay" class="overlay hidden">
        <div class="modal">
            <h3 id="quiz-title" style="margin:0; color:#2e7d32;">任務挑戰</h3>
            <p id="quiz-q" style="font-size: 18px; margin: 20px 0; line-height: 1.6; text-align: left;"></p>
            <div id="quiz-options"></div>
            <div id="invite-area" class="hidden">
                <p id="invite-text" style="font-size: 19px; font-weight: bold; color: var(--deep-blue);"></p>
                <div class="invite-btns">
                    <button class="btn-invite btn-yes" onclick="handleInvite(true)">要</button>
                    <button class="btn-invite btn-no" onclick="handleInvite(false)">不要</button>
                </div>
            </div>
            <p id="quiz-msg" style="font-weight:bold; margin-top:15px; min-height: 24px;"></p>
            <canvas id="final-canvas" width="380" height="380"></canvas>
            <button id="next-btn" class="btn-main hidden" onclick="closeModal()">繼續</button>
            <button id="restart-btn" class="btn-main hidden" onclick="location.reload()" style="background:#666;">重新開始</button>
        </div>
    </div>
</div>

                { q: "請問拼音「yā zi」對應的漢字是：", a: ["鴨子", "雞子", "魚子"], c: 0, icon: "🦆", name: "達克", type: "PtoH" },
                { q: "請問「老虎」的拼音是：", a: ["lǎo hǔ", "nǎo hǔ", "lǎo fǔ"], c: 0, icon: "🐯", name: "泰格", type: "HtoP" },
                { q: "請問拼音「xióng māo」對應的漢字是：", a: ["熊貓", "松鼠", "獅子"], c: 0, icon: "🐼", name: "圓圓", type: "PtoH" },
                { q: "請問「兔子」的拼音是：", a: ["tù zi", "dù zi", "pù zi"], c: 0, icon: "🐰", name: "小兔", type: "HtoP" },
                { q: "請問拼音「hǎi bào」對應的漢字是：", a: ["海豹", "海鳥", "河馬"], c: 0, icon: "🦭", name: "滑滑", type: "PtoH" },
                { q: "請問「狗狗」的拼音是：", a: ["gǒu gou", "kǒu gou", "gōu gou"], c: 0, icon: "🐶", name: "阿狗", type: "HtoP" },
                { q: "請問拼音「māo mī」對應的漢字是：", a: ["貓咪", "毛筆", "描繪"], c: 0, icon: "🐱", name: "喵喵", type: "PtoH" },
                { q: "請問「大象」的拼音是：", a: ["dà xiàng", "dà xiǎng", "tà xiàng"], c: 0, icon: "🐘", name: "大鼻", type: "HtoP" },
                { q: "請問拼音「hóu zi」對應的漢字是：", a: ["猴子", "盒子", "鬍子"], c: 0, icon: "🐒", name: "猴哥", type: "PtoH" }
            ],
            plant: [
                { q: "請問「橘子」的拼音是：", a: ["jú zi", "jǘ zi", "qú zi"], c: 0, icon: "🍊", name: "大吉", type: "HtoP" },
                { q: "請問拼音「fān qié」對應的漢字是：", a: ["番茄", "翻茄", "分茄"], c: 0, icon: "🍅", name: "湯姆", type: "PtoH" },
                { q: "請問「西瓜」的拼音是：", a: ["xī guā", "xié guā", "sī guā"], c: 0, icon: "🍉", name: "維特", type: "HtoP" },
                { q: "請問拼音「máng guǒ」對應的漢字是：", a: ["芒果", "忙過", "盲過"], c: 0, icon: "🥭", name: "小芒", type: "PtoH" },
                { q: "請問「櫻花」的拼音是：", a: ["yīng huā", "yǐng huā", "rīng huā"], c: 0, icon: "🌸", name: "小櫻", type: "HtoP" },
                { q: "請問拼音「shū cài」對應的漢字是：", a: ["蔬菜", "水果", "甜點"], c: 0, icon: "🥬", name: "蔬菜", type: "PtoH" },
                { q: "請問「向日葵」的拼音是：", a: ["xiàng rì kuí", "xiǎng rì kuí", "siàng rì kuí"], c: 0, icon: "🌻", name: "向日葵", type: "HtoP" },
                { q: "請問拼音「xiān zhǎng zhǎng」對應的漢字是：", a: ["仙人掌", "鮮人掌", "險人掌"], c: 0, icon: "🌵", name: "仙人掌", type: "PtoH" },
                { q: "請問「聖誕樹」的拼音是：", a: ["shèng dàn shù", "shèn dàn shù", "sèn dàn shù"], c: 0, icon: "🎄", name: "聖誕樹", type: "HtoP" },
                { q: "請問拼音「méi guī huā」對應的漢字是：", a: ["玫瑰花", "梅花", "桃花"], c: 0, icon: "🌹", name: "玫瑰", type: "PtoH" }
            ]
        }
    };

    const islandTypes = { 1: "小島", 2: "中島", 3: "大島" };

    let state = {
        name: "",
        selectedBook: 1,
        res: { pts: 0, ani: 0, pla: 0 },
        lvl: 0,
        names: ["露天帳篷 ⛺", "溫馨木屋 🪵", "雙層別墅 🏡", "夢幻大堡壘 🏰"],
        req: [0, 5, 12, 25],
        unlockedAnimals: [],
        unlockedPlants: [],
        currentAnimal: null
    };

    const typeToItem = { "pinyin": "石頭", "grammar": "木頭", "usage": "樹葉", "culture": "朋友" };

    function startGame() {
        const n = document.getElementById('player-input').value.trim();
        if(!n) return alert("請輸入島主名字！");
        state.name = n;
        document.getElementById('name-overlay').classList.add('hidden');
        document.getElementById('book-overlay').classList.remove('hidden');
    }

    function showBookSelection() { startGame(); }

    function selectBook(num) {
        state.selectedBook = num;
        document.getElementById('book-overlay').classList.add('hidden');
        document.getElementById('hud').classList.remove('hidden');
        document.getElementById('display-book').innerText = `${islandTypes[num]}`;
        save(); updateUI();
    }

    function updateUI() {
        document.getElementById('display-name').innerText = state.name;
        document.getElementById('r-pts').innerText = state.res.pts;
        document.getElementById('r-ani').innerText = state.res.ani;
        document.getElementById('r-pla').innerText = state.res.pla;
        const target = state.req[state.lvl+1] || state.req[state.lvl];
        const p = state.lvl >= 3 ? 100 : Math.min((state.res.pts/target)*100, 100);
        document.getElementById('progress-bar').style.width = p + "%";
        document.getElementById('house-status').innerText = `開發進度：${state.names[state.lvl]} (${state.res.pts}/${target})`;
        if(state.lvl >= 1) {
            document.getElementById('tab-animal').className = "nav-tab tab-unlocked";
            document.getElementById('tab-plant').className = "nav-tab tab-unlocked";
        }
    }

    function triggerQuiz(type) {
        const qList = allQuestions[state.selectedBook][type];
        const qData = qList[Math.floor(Math.random()*qList.length)];
        showModal("地圖挑戰", qData, (isCorrect) => {
            if(isCorrect) {
                state.res.pts++;
                const item = typeToItem[type];
                document.getElementById('quiz-msg').innerText = type === 'culture' ? `✨ 太棒了！成功拜訪了朋友！` : `✨ 太棒了！你獲得了${item}！`;
            }
            save(); updateUI();
        });
    }

    function startSpecial(mode) {
        if(state.lvl < 1) return alert("請先升級房屋再解鎖特別任務！");
        const qList = allQuestions.common[mode];
        const qData = qList[Math.floor(Math.random()*qList.length)];
        showModal(mode === 'animal' ? "招募島民" : "種種植物", qData, (isCorrect) => {
            if(isCorrect) {
                if(mode === 'animal') {
                    state.currentAnimal = qData;
                    document.getElementById('quiz-options').classList.add('hidden');
                    document.getElementById('invite-area').classList.remove('hidden');
                    document.getElementById('invite-text').innerText = `發現了新夥伴 ${qData.icon} ${qData.name}！要邀請他來當島民嗎？`;
                } else {
                    state.res.pla++;
                    state.unlockedPlants.push(qData.icon);
                    document.getElementById('quiz-msg').innerText = `✨ 太棒了！獲得了樹葉！`;
                    save(); updateUI();
                }
            } else save(); updateUI();
        });
    }

    function handleInvite(wantIt) {
        const msg = document.getElementById('quiz-msg');
        document.getElementById('invite-area').classList.add('hidden');
        if(wantIt) {
            state.res.ani++;
            state.unlockedAnimals.push(state.currentAnimal.icon);
            msg.innerText = `🎊 成功拜訪了朋友！${state.currentAnimal.name} 加入了小島。`;
            msg.style.color = "green";
        } else {
            msg.innerText = `島主：期待下次再見到${state.currentAnimal.name}！`;
            msg.style.color = "orange";
        }
        document.getElementById('next-btn').classList.remove('hidden');
        state.currentAnimal = null;
        save(); updateUI();
    }

    function showModal(title, data, callback) {
        document.getElementById('quiz-overlay').classList.remove('hidden');
        document.getElementById('quiz-title').innerText = title;
        document.getElementById('quiz-q').innerText = data.q;
        document.getElementById('quiz-msg').innerText = "";
        document.getElementById('next-btn').classList.add('hidden');
        document.getElementById('invite-area').classList.add('hidden');
        const optDiv = document.getElementById('quiz-options');
        optDiv.classList.remove('hidden');
        optDiv.innerHTML = "";
        data.a.forEach((txt, i) => {
            const b = document.createElement('button');
            b.className = "btn-option";
            b.innerText = txt;
            b.onclick = () => {
                const all = optDiv.querySelectorAll('button');
                all.forEach(btn => btn.disabled = true);
                if(i === data.c) {
                    document.getElementById('quiz-msg').style.color = "green";
                    callback(true);
                    if(title !== "招募島民") document.getElementById('next-btn').classList.remove('hidden');
                } else {
                    document.getElementById('quiz-msg').innerText = "❌ 答錯了！正確答案是：" + data.a[data.c];
                    document.getElementById('quiz-msg').style.color = "red";
                    document.getElementById('next-btn').classList.remove('hidden');
                    callback(false);
                }
            };
            optDiv.appendChild(b);
        });
    }

    function tryBuild() {
        if(state.lvl >= 3) return alert("已達最高等級！");
        if(state.res.pts >= state.req[state.lvl+1]) {
            state.lvl++; alert(`房屋升級成功！🏠`);
            save(); updateUI();
        } else alert(`點數不足，還差 ${state.req[state.lvl+1] - state.res.pts} 點。`);
    }

    function closeModal() { document.getElementById('quiz-overlay').classList.add('hidden'); }
    function save() { localStorage.setItem('penguin_island_massive_v8', JSON.stringify(state)); }

    function endGameFlow() {
        if(!confirm("要結束冒險，拍一張大合照嗎？")) return;
        document.getElementById('quiz-overlay').classList.remove('hidden');
        document.getElementById('quiz-title').innerText = "📸 你的小島！";
        document.getElementById('quiz-options').innerHTML = "";
        document.getElementById('invite-area').classList.add('hidden');
        document.getElementById('next-btn').classList.add('hidden');
        document.getElementById('restart-btn').classList.remove('hidden');
        
        const cvs = document.getElementById('final-canvas');
        cvs.style.display = "block";
        const ctx = cvs.getContext('2d');
        
        // 畫海
        ctx.fillStyle = "#e1f5fe"; 
        ctx.fillRect(0, 0, 380, 380);
        
        // 根據島嶼規模繪製陸地
        ctx.fillStyle = "#f1f8e9"; 
        ctx.beginPath();
        if (state.selectedBook === 1) {
            ctx.ellipse(190, 310, 140, 90, 0, 0, Math.PI*2); // 小島
        } else if (state.selectedBook === 2) {
            ctx.ellipse(190, 330, 170, 120, 0, 0, Math.PI*2); // 中島
        } else {
            ctx.arc(190, 400, 240, 0, Math.PI*2); // 大島
        }
        ctx.fill();

        // 畫房子
        ctx.fillStyle = "#8d6e63"; ctx.fillRect(140, 170, 100, 80);
        ctx.fillStyle = "#d84315"; ctx.beginPath(); ctx.moveTo(130,170); ctx.lineTo(190,120); ctx.lineTo(250,170); ctx.fill();
        
        // 畫企鵝島主
        ctx.font = "40px Arial"; ctx.fillText("🐧", 170, 280);
        
        // 動態排布動物與植物
        ctx.font = "24px Arial";
        state.unlockedAnimals.forEach((icon, i) => { 
            ctx.fillText(icon, 60 + (i % 6) * 45, 310 + (Math.floor(i/6) * 30)); 
        });
        state.unlockedPlants.forEach((icon, i) => { 
            ctx.fillText(icon, 70 + (i % 6) * 45, 230 + (Math.floor(i/6) * 30)); 
        });

        // 加上島嶼名牌 (只顯示OO的南極小島)
        ctx.fillStyle = "#01579b"; 
        ctx.font = "bold 24px 'Microsoft JhengHei'"; 
        ctx.textAlign = "center";
        ctx.fillText(`${state.name} 的南極小島`, 190, 40);
        
        localStorage.removeItem('penguin_island_massive_v8');
    }

    const saved = localStorage.getItem('penguin_island_massive_v8');
    if(saved) {
        state = JSON.parse(saved);
        if(state.name) {
            document.getElementById('name-overlay').classList.add('hidden');
            document.getElementById('hud').classList.remove('hidden');
            document.getElementById('display-book').innerText = `${islandTypes[state.selectedBook]}`;
            updateUI();
        }
    }
</script>
</body>
</html>
