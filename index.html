<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>南極企鵝築巢大冒險 - 華語學習版</title>
    <style>
        :root {
            --ice-blue: #e0f7fa;
            --ocean-blue: #0277bd;
            --snow-white: #ffffff;
            --penguin-black: #263238;
            --danger-red: #ff5252;
            --success-green: #4caf50;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--ice-blue);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        #game-container {
            width: 90%;
            max-width: 800px;
            height: 600px;
            background: var(--snow-white);
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        /* 頂部資訊欄 */
        #hud {
            padding: 15px 25px;
            background: var(--ocean-blue);
            color: white;
            display: flex;
            justify-content: space-between;
            font-weight: bold;
        }

        .resource-item { margin-right: 15px; }

        /* 地圖區域 */
        #game-screen {
            flex-grow: 1;
            position: relative;
            background: linear-gradient(to bottom, #b3e5fc, #ffffff);
            display: grid;
            grid-template-columns: 1fr 1fr;
            grid-template-rows: 1fr 1fr;
            gap: 10px;
            padding: 20px;
        }

        .map-zone {
            border: 3px dashed rgba(0,0,0,0.1);
            border-radius: 15px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            transition: all 0.3s;
            position: relative;
        }

        .map-zone:hover {
            background: rgba(255, 255, 255, 0.5);
            transform: scale(1.02);
            border-color: var(--ocean-blue);
        }

        .zone-label {
            margin-top: 10px;
            font-weight: bold;
            color: var(--ocean-blue);
        }

        /* 幾何圖形圖示 */
        .icon-branch { width: 40px; height: 10px; background: #795548; transform: rotate(45deg); }
        .icon-leaf { width: 30px; height: 30px; background: #81c784; border-radius: 0 50%; transform: rotate(-45deg); }
        .icon-stone { width: 40px; height: 30px; background: #9e9e9e; border-radius: 40% 60% 50% 50%; }
        .icon-penguin {
            width: 35px; height: 45px; background: var(--penguin-black);
            border-radius: 50% 50% 20% 20%;
            position: relative;
        }
        .icon-penguin::after {
            content: ''; position: absolute; width: 20px; height: 25px;
            background: white; left: 7.5px; top: 15px; border-radius: 50%;
        }

        /* 彈出對話框 */
        #modal-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.7); display: none;
            justify-content: center; align-items: center; z-index: 100;
        }

        #quiz-card {
            background: white; padding: 30px; border-radius: 15px;
            width: 80%; max-width: 500px; text-align: center;
        }

        .option-btn {
            display: block; width: 100%; padding: 12px; margin: 10px 0;
            border: 2px solid var(--ocean-blue); border-radius: 8px;
            background: none; cursor: pointer; font-size: 16px; transition: 0.2s;
        }

        .option-btn:hover { background: var(--ice-blue); }

        /* 建築進度 */
        #build-panel {
            padding: 15px; background: #f5f5f5; border-top: 2px solid #ddd;
            text-align: center;
        }

        .progress-bar {
            width: 100%; height: 20px; background: #ddd; border-radius: 10px; overflow: hidden; margin: 10px 0;
        }

        #progress-fill { width: 0%; height: 100%; background: var(--success-green); transition: width 0.5s; }

        .hidden { display: none !important; }
    </style>
</head>
<body>

<div id="game-container">
    <div id="hud">
        <div id="player-name">🐧 企鵝小華 (Kayo)</div>
        <div>
            <span class="resource-item">🌿 樹枝: <span id="r-branch">0</span></span>
            <span class="resource-item">🍃 樹葉: <span id="r-leaf">0</span></span>
            <span class="resource-item">🪨 石頭: <span id="r-stone">0</span></span>
        </div>
    </div>

    <div id="game-screen">
        <div class="map-zone" onclick="startChallenge('branch')">
            <div class="icon-branch"></div>
            <div class="zone-label">樹枝區 (語法)</div>
        </div>
        <div class="map-zone" onclick="startChallenge('leaf')">
            <div class="icon-leaf"></div>
            <div class="zone-label">樹葉區 (詞彙)</div>
        </div>
        <div class="map-zone" onclick="startChallenge('stone')">
            <div class="icon-stone"></div>
            <div class="zone-label">石頭區 (台灣文化)</div>
        </div>
        <div class="map-zone" onclick="startChallenge('penguin')">
            <div class="icon-penguin"></div>
            <div class="zone-label">企鵝區 (綜合挑戰)</div>
        </div>
    </div>

    <div id="build-panel">
        <div id="build-status">目前的家：露天雪地 ❄️ (進度 0%)</div>
        <div class="progress-bar"><div id="progress-fill"></div></div>
        <button onclick="tryBuild()" style="padding: 5px 20px; cursor:pointer;">嘗試蓋房子</button>
    </div>

    <div id="modal-overlay">
        <div id="quiz-card">
            <h3 id="quiz-category">題目類型</h3>
            <p id="quiz-question" style="font-size: 18px; margin: 20px 0;"></p>
            <div id="quiz-options"></div>
            <p id="quiz-feedback" style="margin-top:15px; font-weight:bold;"></p>
            <button id="close-modal" class="hidden" onclick="closeModal()" style="margin-top:15px;">繼續冒險</button>
        </div>
    </div>
</div>

<script>
    // --- 題庫資料 (TOCFL A2-B1 & 台灣文化) ---
    const questionBank = {
        branch: [
            { q: "這杯珍奶___我喝完了。", a: ["被", "把", "叫"], correct: 1 },
            { q: "他跑得比我___。", a: ["非常快", "很慢", "快得多"], correct: 2 },
            { q: "作業___老師改好了。", a: ["被", "把", "讓"], correct: 0 }
        ],
        leaf: [
            { q: "在台灣，買飲料可以調整___度（甜度）。", a: ["冰", "糖", "熱"], correct: 1 },
            { q: "我要買一___筆。", a: ["條", "個", "枝"], correct: 2 },
            { q: "這雙鞋子雖然很貴，___質量很好。", a: ["而且", "但是", "所以"], correct: 1 }
        ],
        stone: [
            { q: "在台灣搭捷運時，不能做什麼？", a: ["看報紙", "玩手機", "吃東西"], correct: 2 },
            { q: "台灣人說「去冰」是什麼意思？", a: ["不加冰塊", "加很多冰", "冰塊融化了"], correct: 0 },
            { q: "台灣最有名的夜市小吃「珍奶」全名是？", a: ["珍珠奶茶", "珍貴奶茶", "真實奶茶"], correct: 0 }
        ],
        penguin: [
            { q: "綜合題：小明：「這附近有超商嗎？」小華：「___過馬路就到了。」", a: ["就", "才", "走"], correct: 2 },
            { q: "綜合題：「微糖」通常是指多少甜度？", a: ["3分糖", "7分糖", "5分糖"], correct: 0 }
        ],
        event: [
            { q: "【事件】跌入冰層了！請回答：台灣的報稅月份通常是？", a: ["五月", "一月", "十月"], correct: 0 },
            { q: "【事件】暴風雪來襲！「不見不散」的意思是？", a: ["不見面就散會", "一定要見到面", "不能隨便散步"], correct: 1 }
        ]
    };

    // --- 遊戲狀態 ---
    let gameState = {
        resources: { branch: 0, leaf: 0, stone: 0, penguin: 0 },
        houseLevel: 0,
        houseNames: ["露天雪地", "簡易草巢", "穩固木屋", "豪華石宮"],
        totalNeeded: [0, 5, 15, 30] // 升級所需總材料數
    };

    // --- 初始化 ---
    function init() {
        const saved = localStorage.getItem('penguinGameSave');
        if (saved) {
            gameState = JSON.parse(saved);
        }
        updateHUD();
        updateBuildProgress();
    }

    function updateHUD() {
        document.getElementById('r-branch').innerText = gameState.resources.branch;
        document.getElementById('r-leaf').innerText = gameState.resources.leaf;
        document.getElementById('r-stone').innerText = gameState.resources.stone;
    }

    function updateBuildProgress() {
        const currentLevel = gameState.houseLevel;
        if(currentLevel >= 3) {
            document.getElementById('build-status').innerText = "最終目標：豪華石宮 🏆 已達成！";
            document.getElementById('progress-fill').style.width = "100%";
            return;
        }

        const nextReq = gameState.totalNeeded[currentLevel + 1];
        const currentTotal = gameState.resources.branch + gameState.resources.leaf + gameState.resources.stone;
        const percent = Math.min((currentTotal / nextReq) * 100, 100);
        
        document.getElementById('progress-fill').style.width = percent + "%";
        document.getElementById('build-status').innerText = `目前的家：${gameState.houseNames[currentLevel]} (目標材料: ${currentTotal}/${nextReq})`;
    }

    // --- 挑戰邏輯 ---
    function startChallenge(type) {
        // 平衡檢查
        const res = gameState.resources;
        if (type !== 'penguin' && res[type] > (res.branch + res.leaf + res.stone) / 2 + 3) {
            alert("這項材料太多了！企鵝建議你去別的地方看看，否則房子會不平衡喔！");
            return;
        }

        // 機率觸發隨機事件
        if (Math.random() < 0.15) {
            triggerRandomEvent();
            return;
        }

        showQuiz(type);
    }

    function showQuiz(type) {
        const questions = questionBank[type];
        const randomQ = questions[Math.floor(Math.random() * questions.length)];
        
        document.getElementById('modal-overlay').style.display = 'flex';
        document.getElementById('quiz-category').innerText = `【挑戰】獲取${type === 'penguin' ? '經驗' : '材料'}`;
        document.getElementById('quiz-question').innerText = randomQ.q;
        
        const optionsDiv = document.getElementById('quiz-options');
        optionsDiv.innerHTML = '';
        document.getElementById('quiz-feedback').innerText = '';
        document.getElementById('close-modal').classList.add('hidden');

        randomQ.a.forEach((opt, index) => {
            const btn = document.createElement('button');
            btn.className = 'option-btn';
            btn.innerText = opt;
            btn.onclick = () => checkAnswer(index, randomQ.correct, type);
            optionsDiv.appendChild(btn);
        });
    }

    function checkAnswer(selected, correct, type) {
        const feedback = document.getElementById('quiz-feedback');
        const btns = document.querySelectorAll('.option-btn');
        btns.forEach(b => b.disabled = true);

        if (selected === correct) {
            feedback.innerText = "答對了！✨ 獲得材料 +1";
            feedback.style.color = 'var(--success-green)';
            if (type !== 'event') gameState.resources[type]++;
        } else {
            feedback.innerText = "可惜答錯了... 正確答案是：" + document.querySelectorAll('.option-btn')[correct].innerText;
            feedback.style.color = 'var(--danger-red)';
        }

        document.getElementById('close-modal').classList.remove('hidden');
        saveGame();
        updateHUD();
        updateBuildProgress();
    }

    function triggerRandomEvent() {
        const eventType = Math.random() > 0.5 ? "暴風雪" : "掉進冰層";
        document.getElementById('modal-overlay').style.display = 'flex';
        document.getElementById('quiz-category').innerText = `⚠️ 緊急事件：${eventType}！`;
        
        const questions = questionBank.event;
        const randomQ = questions[Math.floor(Math.random() * questions.length)];
        
        document.getElementById('quiz-question').innerText = `如果你能答對這題，救援隊就會來救你：\n\n${randomQ.q}`;
        
        const optionsDiv = document.getElementById('quiz-options');
        optionsDiv.innerHTML = '';
        document.getElementById('quiz-feedback').innerText = '';
        document.getElementById('close-modal').classList.add('hidden');

        randomQ.a.forEach((opt, index) => {
            const btn = document.createElement('button');
            btn.className = 'option-btn';
            btn.innerText = opt;
            btn.onclick = () => {
                if (index === randomQ.correct) {
                    alert("救援成功！你平安無事。");
                    closeModal();
                } else {
                    const lost = Math.min(gameState.resources.branch, 1);
                    gameState.resources.branch -= lost;
                    alert(`救援失敗... 你損失了一些樹枝。`);
                    closeModal();
                }
                updateHUD();
                saveGame();
            };
            optionsDiv.appendChild(btn);
        });
    }

    function tryBuild() {
        const currentLevel = gameState.houseLevel;
        if(currentLevel >= 3) return;

        const nextReq = gameState.totalNeeded[currentLevel + 1];
        const currentTotal = gameState.resources.branch + gameState.resources.leaf + gameState.resources.stone;

        if (currentTotal >= nextReq) {
            gameState.houseLevel++;
            alert(`恭喜！你的家升級為：${gameState.houseNames[gameState.houseLevel]} 🎉`);
            saveGame();
            updateBuildProgress();
        } else {
            alert(`材料還不夠喔！還差 ${nextReq - currentTotal} 個材料。`);
        }
    }

    function closeModal() {
        document.getElementById('modal-overlay').style.display = 'none';
    }

    function saveGame() {
        localStorage.setItem('penguinGameSave', JSON.stringify(gameState));
    }

    // 啟動
    init();

</script>
</body>
</html>
