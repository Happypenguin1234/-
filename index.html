<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>南極企鵝築巢大冒險 - 華語學習版</title>
    <style>
        :root {
            --ice-blue: #e0f7fa;
            --ocean-blue: #0277bd;
            --snow-white: #ffffff;
            --penguin-black: #263238;
            --danger-red: #ff5252;
            --success-green: #4caf50;
        }

        body {
            font-family: 'Segoe UI', 'Microsoft JhengHei', sans-serif;
            background-color: var(--ice-blue);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        #game-container {
            width: 90%;
            max-width: 800px;
            height: 600px;
            background: var(--snow-white);
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        /* 頂部資訊欄 */
        #hud {
            padding: 15px 25px;
            background: var(--ocean-blue);
            color: white;
            display: flex;
            justify-content: space-between;
            font-weight: bold;
        }

        .resource-item { margin-right: 15px; }

        /* 地圖區域 */
        #game-screen {
            flex-grow: 1;
            position: relative;
            background: linear-gradient(to bottom, #b3e5fc, #ffffff);
            display: grid;
            grid-template-columns: 1fr 1fr;
            grid-template-rows: 1fr 1fr;
            gap: 10px;
            padding: 20px;
        }

        .map-zone {
            border: 3px dashed rgba(0,0,0,0.1);
            border-radius: 15px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            transition: all 0.3s;
            position: relative;
        }

        .map-zone:hover {
            background: rgba(255, 255, 255, 0.5);
            transform: scale(1.02);
            border-color: var(--ocean-blue);
        }

        .zone-label {
            margin-top: 10px;
            font-weight: bold;
            color: var(--ocean-blue);
        }

        /* 幾何圖形圖示 */
        .icon-branch { width: 40px; height: 10px; background: #795548; transform: rotate(45deg); }
        .icon-leaf { width: 30px; height: 30px; background: #81c784; border-radius: 0 50%; transform: rotate(-45deg); }
        .icon-stone { width: 40px; height: 30px; background: #9e9e9e; border-radius: 40% 60% 50% 50%; }
        .icon-penguin {
            width: 35px; height: 45px; background: var(--penguin-black);
            border-radius: 50% 50% 20% 20%;
            position: relative;
        }
        .icon-penguin::after {
            content: ''; position: absolute; width: 20px; height: 25px;
            background: white; left: 7.5px; top: 15px; border-radius: 50%;
        }

        /* 彈出對話框 & 命名畫面 */
        .overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8); display: flex;
            justify-content: center; align-items: center; z-index: 100;
        }

        .modal-card {
            background: white; padding: 40px; border-radius: 15px;
            width: 80%; max-width: 450px; text-align: center;
        }

        .input-field {
            width: 80%; padding: 10px; margin: 20px 0;
            border: 2px solid var(--ocean-blue); border-radius: 5px;
            font-size: 18px; text-align: center;
        }

        .option-btn, .action-btn {
            display: block; width: 100%; padding: 12px; margin: 10px 0;
            border: 2px solid var(--ocean-blue); border-radius: 8px;
            background: none; cursor: pointer; font-size: 16px; transition: 0.2s;
        }

        .action-btn { background: var(--ocean-blue); color: white; }
        .option-btn:hover { background: var(--ice-blue); }

        /* 建築進度 */
        #build-panel {
            padding: 15px; background: #f5f5f5; border-top: 2px solid #ddd;
            text-align: center;
        }

        .progress-bar {
            width: 100%; height: 20px; background: #ddd; border-radius: 10px; overflow: hidden; margin: 10px 0;
        }

        #progress-fill { width: 0%; height: 100%; background: var(--success-green); transition: width 0.5s; }

        .hidden { display: none !important; }
    </style>
</head>
<body>

<div id="game-container">
    <div id="name-overlay" class="overlay">
        <div class="modal-card">
            <h2>🐧 歡迎來到南極！</h2>
            <p>在開始蓋房子之前，請告訴大家你的名字：</p>
            <input type="text" id="name-input" class="input-field" placeholder="請輸入你的名字">
            <button class="action-btn" onclick="setPlayerName()">開始冒險</button>
        </div>
    </div>

    <div id="hud" class="hidden">
        <div id="player-display">🐧 <span id="display-name">玩家</span></div>
        <div>
            <span class="resource-item">🌿 樹枝: <span id="r-branch">0</span></span>
            <span class="resource-item">🍃 樹葉: <span id="r-leaf">0</span></span>
            <span class="resource-item">🪨 石頭: <span id="r-stone">0</span></span>
        </div>
    </div>
