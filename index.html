<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>南極企鵝築巢大冒險</title>
    <style>
        :root {
            --paper-beige: #f9f4e8;
            --ocean-blue: #4fc3f7;
            --deep-blue: #0277bd;
            --gold: #d4af37;
            --penguin-black: #263238;
            --penguin-beak: #ff9800;
        }

        body {
            font-family: 'Segoe UI', 'Microsoft JhengHei', sans-serif;
            background-color: #b3e5fc;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        #game-container {
            width: 95%;
            max-width: 800px;
            height: 650px;
            background: var(--paper-beige);
            border-radius: 15px;
            border: 8px solid white;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            position: relative;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* 頂部裝飾條與分頁 */
        #top-nav {
            background: white;
            padding: 10px;
            display: flex;
            justify-content: center;
            gap: 10px;
            border-bottom: 2px solid #ddd;
        }

        .nav-tab {
            padding: 8px 30px;
            border-radius: 20px;
            font-weight: bold;
            cursor: pointer;
            border: none;
            font-size: 14px;
        }

        .tab-active { background: var(--ocean-blue); color: white; }
        .tab-inactive { background: #eee; color: #888; border: 1px solid #ddd; }

        /* 資源 HUD */
        #hud {
            padding: 10px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(255,255,255,0.6);
            border-bottom: 1px dashed #ccc;
        }

        .res-box { display: flex; gap: 15px; font-weight: bold; color: var(--deep-blue); }

        /* 遊戲主區塊 (卡牌化) */
        #game-screen {
            flex-grow: 1;
            display: grid;
            grid-template-columns: 1fr 1fr;
            grid-template-rows: 1fr 1fr;
            gap: 20px;
            padding: 25px;
            background-image: radial-gradient(#fff 10%, transparent 10%);
            background-size: 20px 20px;
        }

        .stage-card {
            background: white;
            border-radius: 12px;
            border: 3px solid var(--gold);
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            position: relative;
        }

        .stage-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 15px rgba(0,0,0,0.2);
        }

        .stage-title {
            margin-top: 10px;
            padding: 2px 15px;
            background: var(--deep-blue);
            color: white;
            border-radius: 4px;
            font-size: 14px;
        }

        /* 圖示設計 (CSS 繪圖) */
        .icon-wrap { height: 60px; display: flex; align-items: center; }
        .icon-branch { width: 40px; height: 10px; background: #795548; transform: rotate(45deg); border-radius: 5px; }
        .icon-leaf { width: 35px; height: 35px; background: #81c784; border-radius: 0 80%; transform: rotate(-45deg); border: 2px solid #558b2f; }
        .icon-stone { width: 45px; height: 30px; background: #9e9e9e; border-radius: 40% 60% 40% 50%; border-bottom: 4px solid #616161; }
        
        /* 阿德利企鵝 */
        .icon-adelie {
            width: 40px; height: 50px; background: var(--penguin-black);
            border-radius: 50% 50% 30% 30%; position: relative;
        }
        .icon-adelie::after {
            content: ''; position: absolute; width: 26px; height: 32px;
            background: white; bottom: 4px; left: 7px; border-radius: 50% 50% 40% 40%;
        }
        .eye-ring { width: 8px; height: 8px; background: white; border-radius: 50%; position: absolute; top: 12px; z-index: 3; }
        .beak { width: 0; height: 0; border-left: 4px solid transparent; border-right: 4px solid transparent; border-top: 6px solid var(--penguin-beak); position: absolute; top: 18px; left: 16px; z-index: 3; }

        /* 底部建築進度 */
        #build-area {
            padding: 15px;
            background: white;
            border-top: 2px solid var(--gold);
            text-align: center;
        }

        .progress-container { width: 100%; height: 12px; background: #eee; border-radius: 10px; margin: 10px 0; overflow: hidden; border: 1px solid #ddd; }
        #progress-bar { width: 0%; height: 100%; background: linear-gradient(to right, #4caf50, #8bc34a); transition: 0.5s; }

        /* 彈出視窗與覆蓋層 */
        .overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8); display: flex; justify-content: center; align-items: center; z-index: 100;
        }

        .modal {
            background: var(--paper-beige); padding: 30px; border-radius: 15px;
            width: 80%; max-width: 400px; text-align: center; border: 5px solid white;
        }

        .btn-main { background: var(--deep-blue); color: white; border: none; padding: 12px 20px; border-radius: 8px; cursor: pointer; width: 100%; margin-top: 10px; font-weight: bold; }
        .btn-option { background: white; border: 2px solid var(--deep-blue); padding: 10px; border-radius: 8px; cursor: pointer; width: 100%; margin: 5px 0; }
        .input-box { width: 90%; padding: 10px; margin: 15px 0; border: 2px solid var(--gold); border-radius: 5px; text-align: center; font-size: 16px; }

        .hidden { display: none !important; }
    </style>
</head>
<body>

<div id="game-container">
    <div id="name-overlay" class="overlay">
        <div class="modal">
            <div class="icon-wrap" style="justify-content: center; margin-bottom: 10px;">
                <div class="icon-adelie"><div class="eye-ring" style="left:6px;"></div><div class="eye-ring" style="right:6px;"></div><div class="beak"></div></div>
            </div>
            <h2>你好，新夥伴！</h2>
            <p>請輸入你的冒險者名字：</p>
            <input type="text" id="player-input" class="input-box" placeholder="例如：Kayo">
            <button class="btn-main" onclick="startGame()">開始冒險</button>
        </div>
    </div>

    <div id="top-nav">
        <button class="nav-tab tab-active">主地圖</button>
        <button class="nav-tab tab-inactive" onclick="alert('特別挑戰將在獲得第一個家後開啟！')">特別挑戰</button>
    </div>

    <div id="hud" class="hidden">
        <div id="user-info">🐧 <span id="display-name">---</span></div>
        <div class="res-box">
            <span>🌿 <span id="r-branch">0</span></span>
            <span>🍃 <span id="r-leaf">0</span></span>
            <span>🪨 <span id="r-stone">0</span></span>
        </div>
        <button onclick="confirmEnd()" style="cursor:pointer; background:none; border:1px solid #888; border-radius:4px; font-size:12px;">結束</button>
    </div>

    <div id="game-screen">
        <div class="stage-card" onclick="startQuiz('branch')">
            <div class="icon-wrap"><div class="icon-branch"></div></div>
            <div class="stage-title">樹枝林 (語法)</div>
        </div>
        <div class="stage-card" onclick="startQuiz('leaf')">
            <div class="icon-wrap"><div class="icon-leaf"></div></div>
            <div class="stage-title">樹葉谷 (詞彙)</div>
        </div>
        <div class="stage-card" onclick="startQuiz('stone')">
            <div class="icon-wrap"><div class="icon-stone"></div></div>
            <div class="stage-title">石頭礦 (文化)</div>
        </div>
        <div class="stage-card" onclick="startQuiz('penguin')">
            <div class="icon-wrap">
                <div class="icon-adelie"><div class="eye-ring" style="left:6px;"></div><div class="eye-ring" style="right:6px;"></div><div class="beak"></div></div>
            </div>
            <div class="stage-title">企鵝村 (綜合)</div>
        </div>
    </div>

    <div id="build-area">
        <div id="house-status" style="font-weight: bold; font-size: 14px;">當前居所：露天雪地</div>
        <div class="progress-container"><div id="progress-bar"></div></div>
        <button class="btn-main" onclick="tryBuild()" style="width: auto; padding: 5px 30px;">蓋房子</button>
    </div>

    <div id="quiz-overlay" class="overlay hidden">
        <div class="modal">
            <h4 id="quiz-type" style="color:var(--deep-blue); margin:0;">挑戰中...</h4>
            <p id="quiz-q" style="font-size: 18px; line-height: 1.5;"></p>
            <div id="quiz-options"></div>
            <p id="quiz-msg" style="margin-top:10px; font-weight:bold;"></p>
            <button id="next-btn" class="btn-main hidden" onclick="closeModal()">繼續</button>
        </div>
    </div>
</div>

<script>
    // --- 遊戲資料 ---
    const questions = {
        branch: [
            { q: "「這本書___我看完了。」", a: ["把", "被", "讓"], c: 1 },
            { q: "他跑得___我快。", a: ["比", "跟", "像"], c: 0 }
        ],
        leaf: [
            { q: "這雙鞋子雖然很貴，___質量很好。", a: ["但是", "而且", "所以"], c: 0 },
            { q: "我要買一___筆。", a: ["條", "個", "枝"], c: 2 }
        ],
        stone: [
            { q: "在台灣，飲料「微糖」是指？", a: ["3分糖", "7分糖", "不加糖"], c: 0 },
            { q: "台灣捷運站內不可以？", a: ["看報紙", "吃東西", "講電話"], c: 1 }
        ],
        penguin: [
            { q: "綜合題：小明：「請問這附近有便利商店嗎？」小華：「___路口右轉就到了。」", a: ["從", "在", "往"], c: 2 }
        ],
        event: [
            { q: "【暴風雪】「不見不散」的意思是？", a: ["不見面就解散", "一定要見到面", "不想見面"], c: 1 }
        ]
    };

    let state = {
        name: "",
        res: { branch: 0, leaf: 0, stone: 0 },
        lvl: 0,
        names: ["露天雪地", "溫馨草窩", "堅固木屋", "華麗石宮"],
        req: [0, 3, 8, 15]
    };

    // --- 核心功能 ---
    function startGame() {
        const n = document.getElementById('player-input').value.trim();
        if (!n) return alert("請輸入名字！");
        state.name = n;
        document.getElementById('name-overlay').classList.add('hidden');
        document.getElementById('hud').classList.remove('hidden');
        save(); updateUI();
    }

    function updateUI() {
        document.getElementById('display-name').innerText = state.name;
        document.getElementById('r-branch').innerText = state.res.branch;
        document.getElementById('r-leaf').innerText = state.res.leaf;
        document.getElementById('r-stone').innerText = state.res.stone;
        
        const total = state.res.branch + state.res.leaf + state.res.stone;
        const target = state.req[state.lvl+1] || state.req[state.lvl];
        const p = state.lvl >= 3 ? 100 : Math.min((total/target)*100, 100);
        document.getElementById('progress-bar').style.width = p + "%";
        document.getElementById('house-status').innerText = `當前居所：${state.names[state.lvl]} (材料: ${total}/${target})`;
    }

    function startQuiz(type) {
        if (Math.random() < 0.15) return triggerEvent();
        
        const qList = questions[type === 'penguin' ? 'penguin' : type];
        const qData = qList[Math.floor(Math.random()*qList.length)];
        showQuizModal("挑戰挑戰", qData, (isCorrect) => {
            if (isCorrect && type !== 'penguin') state.res[type]++;
            else if (isCorrect && type === 'penguin') state.res.branch++; // 企鵝區獎勵
            save(); updateUI();
        });
    }

    function triggerEvent() {
        const qData = questions.event[0];
        showQuizModal("⚠️ 緊急事件：暴風雪！", qData, (isCorrect) => {
            if (!isCorrect) {
                state.res.branch = Math.max(0, state.res.branch - 1);
                alert("你損失了材料...");
            } else {
                alert("平安脫險！");
            }
            save(); updateUI();
        });
    }

    function showQuizModal(title, data, callback) {
        document.getElementById('quiz-overlay').classList.remove('hidden');
        document.getElementById('quiz-type').innerText = title;
        document.getElementById('quiz-q').innerText = data.q;
        document.getElementById('quiz-msg').innerText = "";
        document.getElementById('next-btn').classList.add('hidden');
        
        const optDiv = document.getElementById('quiz-options');
        optDiv.innerHTML = "";
        data.a.forEach((txt, i) => {
            const b = document.createElement('button');
            b.className = "btn-option";
            b.innerText = txt;
            b.onclick = () => {
                const all = optDiv.querySelectorAll('button');
                all.forEach(btn => btn.disabled = true);
                if (i === data.c) {
                    document.getElementById('quiz-msg').innerText = "✨ 正確！獲得了獎勵。";
                    document.getElementById('quiz-msg').style.color = "green";
                    callback(true);
                } else {
                    document.getElementById('quiz-msg').innerText = "❌ 答錯了，再接再厲！";
                    document.getElementById('quiz-msg').style.color = "red";
                    callback(false);
                }
                document.getElementById('next-btn').classList.remove('hidden');
            };
            optDiv.appendChild(b);
        });
    }

    function tryBuild() {
        if (state.lvl >= 3) return alert("你已經擁有最好的石宮了！");
        const total = state.res.branch + state.res.leaf + state.res.stone;
        if (total >= state.req[state.lvl+1]) {
            state.lvl++;
            alert(`恭喜升級為：${state.names[state.lvl]}！`);
            save(); updateUI();
        } else {
            alert("材料還不夠喔，再去收集一點吧！");
        }
    }

    function confirmEnd() {
        if (confirm(`冒險者 ${state.name}，確定要結束並清除紀錄嗎？`)) {
            localStorage.removeItem('penguin_game_save');
            location.reload();
        }
    }

    function closeModal() { document.getElementById('quiz-overlay').classList.add('hidden'); }
    function save() { localStorage.setItem('penguin_game_save', JSON.stringify(state)); }

    // 初始化
    const saved = localStorage.getItem('penguin_game_save');
    if (saved) {
        state = JSON.parse(saved);
        if (state.name) {
            document.getElementById('name-overlay').classList.add('hidden');
            document.getElementById('hud').classList.remove('hidden');
            updateUI();
        }
    }
</script>
</body>
</html>
